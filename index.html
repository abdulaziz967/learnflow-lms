<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnFlow — Advanced Online Course Platform</title>
<style>
:root {
  --brand: #4f46e5;
  --brand-light: #eef2ff;
  --brand-mid: #818cf8;
  --surface: #ffffff;
  --surface-alt: #f8fafc;
  --surface-hover: #f1f5f9;
  --border: #e2e8f0;
  --border-strong: #cbd5e1;
  --text: #0f172a;
  --text-2: #475569;
  --text-3: #94a3b8;
  --success: #16a34a;
  --success-bg: #f0fdf4;
  --warn: #d97706;
  --warn-bg: #fffbeb;
  --danger: #dc2626;
  --danger-bg: #fef2f2;
  --info: #0284c7;
  --info-bg: #f0f9ff;
  --radius: 10px;
  --radius-lg: 16px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.10);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background:#f1f5f9; color:var(--text); min-height:100vh; font-size:15px; line-height:1.6; }
a { color:var(--brand); text-decoration:none; }
button { cursor:pointer; font-family:inherit; font-size:15px; }
input, textarea, select { font-family:inherit; font-size:15px; }
h1,h2,h3,h4 { font-weight:600; line-height:1.3; }

/* Layout */
.app-shell { display:flex; min-height:100vh; }
.sidebar { width:240px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:100; transition:transform .25s; }
.sidebar-logo { padding:20px 20px 16px; border-bottom:1px solid var(--border); }
.sidebar-logo .wordmark { font-size:19px; font-weight:700; color:var(--brand); letter-spacing:-.3px; }
.sidebar-logo .tagline { font-size:11px; color:var(--text-3); margin-top:2px; }
.sidebar-nav { flex:1; padding:12px 10px; overflow-y:auto; }
.nav-section-label { font-size:10px; font-weight:600; color:var(--text-3); letter-spacing:.8px; text-transform:uppercase; padding:12px 10px 6px; }
.nav-item { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:var(--radius); color:var(--text-2); font-size:14px; font-weight:500; cursor:pointer; transition:all .15s; margin-bottom:2px; border:none; background:none; width:100%; text-align:left; }
.nav-item:hover { background:var(--surface-alt); color:var(--text); }
.nav-item.active { background:var(--brand-light); color:var(--brand); }
.nav-item .nav-icon { font-size:18px; width:20px; flex-shrink:0; }
.nav-badge { margin-left:auto; background:var(--brand); color:white; font-size:10px; font-weight:700; padding:1px 6px; border-radius:20px; min-width:18px; text-align:center; }
.sidebar-footer { padding:12px; border-top:1px solid var(--border); }
.user-pill { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:var(--radius); background:var(--surface-alt); }
.avatar { width:32px; height:32px; border-radius:50%; background:var(--brand); color:white; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; flex-shrink:0; }
.user-pill .uname { font-size:13px; font-weight:600; line-height:1.2; }
.user-pill .urole { font-size:11px; color:var(--text-3); }
.logout-btn { font-size:12px; color:var(--text-3); background:none; border:none; cursor:pointer; padding:0; display:block; margin-top:4px; text-align:left; }
.logout-btn:hover { color:var(--danger); }

.main { margin-left:240px; flex:1; min-height:100vh; }
.topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 28px; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
.topbar-title { font-size:17px; font-weight:600; }
.topbar-actions { display:flex; align-items:center; gap:10px; }
.content-area { padding:28px; max-width:1100px; }

/* Buttons */
.btn { display:inline-flex; align-items:center; gap:7px; padding:9px 18px; border-radius:var(--radius); font-weight:500; font-size:14px; border:1px solid transparent; transition:all .15s; }
.btn-primary { background:var(--brand); color:white; border-color:var(--brand); }
.btn-primary:hover { background:#4338ca; }
.btn-secondary { background:var(--surface); color:var(--text); border-color:var(--border); }
.btn-secondary:hover { background:var(--surface-alt); }
.btn-danger { background:var(--danger); color:white; }
.btn-success { background:var(--success); color:white; }
.btn-sm { padding:5px 12px; font-size:13px; }
.btn:disabled { opacity:.5; cursor:not-allowed; }
.icon-btn { width:34px; height:34px; display:inline-flex; align-items:center; justify-content:center; border-radius:var(--radius); border:1px solid var(--border); background:var(--surface); color:var(--text-2); font-size:16px; transition:all .15s; }
.icon-btn:hover { background:var(--surface-alt); color:var(--text); }

/* Cards */
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px; }
.card-sm { padding:14px 16px; }
.section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
.section-title { font-size:16px; font-weight:600; }

/* Stats row */
.stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:16px; margin-bottom:24px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:18px 20px; }
.stat-num { font-size:26px; font-weight:700; line-height:1; margin-bottom:4px; }
.stat-label { font-size:13px; color:var(--text-2); }
.stat-delta { font-size:12px; color:var(--success); margin-top:6px; }

/* Badges / Pills */
.badge { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:20px; font-size:12px; font-weight:600; }
.badge-success { background:var(--success-bg); color:var(--success); }
.badge-warn { background:var(--warn-bg); color:var(--warn); }
.badge-danger { background:var(--danger-bg); color:var(--danger); }
.badge-info { background:var(--info-bg); color:var(--info); }
.badge-brand { background:var(--brand-light); color:var(--brand); }
.badge-gray { background:#f1f5f9; color:var(--text-2); }

/* Course Cards */
.courses-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:18px; }
.course-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; cursor:pointer; transition:all .2s; }
.course-card:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); border-color:var(--brand-mid); }
.course-thumb { height:140px; display:flex; align-items:center; justify-content:center; font-size:40px; position:relative; }
.course-body { padding:16px; }
.course-title { font-size:15px; font-weight:600; margin-bottom:5px; }
.course-meta { font-size:12px; color:var(--text-2); display:flex; gap:12px; flex-wrap:wrap; margin-bottom:10px; }
.course-progress { height:4px; background:#e2e8f0; border-radius:4px; overflow:hidden; }
.course-progress-bar { height:100%; background:var(--brand); border-radius:4px; transition:width .4s; }
.course-instructor { display:flex; align-items:center; gap:7px; margin-top:10px; }
.instructor-av { width:24px; height:24px; border-radius:50%; background:var(--brand-mid); color:white; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; }

/* Lesson Viewer */
.lesson-layout { display:grid; grid-template-columns:1fr 320px; gap:20px; }
.video-area { background:#0f172a; border-radius:var(--radius-lg); aspect-ratio:16/9; display:flex; align-items:center; justify-content:center; color:white; position:relative; overflow:hidden; }
.video-placeholder { text-align:center; }
.play-btn { width:64px; height:64px; background:rgba(255,255,255,.15); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:24px; margin:0 auto 12px; border:2px solid rgba(255,255,255,.3); cursor:pointer; transition:all .2s; }
.play-btn:hover { background:rgba(255,255,255,.25); transform:scale(1.05); }
.video-controls { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(transparent,rgba(0,0,0,.7)); padding:16px; display:flex; align-items:center; gap:10px; }
.vc-progress { flex:1; height:3px; background:rgba(255,255,255,.3); border-radius:3px; cursor:pointer; }
.vc-fill { height:100%; background:var(--brand-mid); border-radius:3px; width:35%; }
.vc-time { font-size:12px; color:rgba(255,255,255,.8); }
.lesson-list { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; }
.lesson-list-header { padding:14px 16px; font-weight:600; font-size:14px; border-bottom:1px solid var(--border); }
.lesson-item { display:flex; align-items:center; gap:10px; padding:10px 14px; cursor:pointer; transition:background .15s; border-bottom:1px solid var(--border); }
.lesson-item:last-child { border-bottom:none; }
.lesson-item:hover { background:var(--surface-alt); }
.lesson-item.active { background:var(--brand-light); }
.lesson-check { width:22px; height:22px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:12px; }
.lesson-check.done { background:var(--success); border-color:var(--success); color:white; }
.lesson-check.active { border-color:var(--brand); }
.lesson-info { flex:1; min-width:0; }
.lesson-name { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lesson-dur { font-size:11px; color:var(--text-3); }

/* Quiz */
.quiz-wrap { max-width:680px; }
.quiz-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.timer-pill { background:var(--brand); color:white; padding:6px 16px; border-radius:20px; font-weight:700; font-size:16px; }
.timer-pill.danger { background:var(--danger); }
.progress-steps { display:flex; gap:4px; margin-bottom:24px; }
.progress-step { flex:1; height:4px; border-radius:4px; background:var(--border); transition:background .3s; }
.progress-step.done { background:var(--success); }
.progress-step.current { background:var(--brand); }
.question-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:24px; margin-bottom:16px; }
.question-label { font-size:12px; color:var(--text-3); font-weight:600; text-transform:uppercase; letter-spacing:.6px; margin-bottom:12px; }
.question-text { font-size:17px; font-weight:500; margin-bottom:20px; line-height:1.5; }
.option { padding:13px 16px; border:2px solid var(--border); border-radius:var(--radius); margin-bottom:8px; cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:12px; font-size:15px; }
.option-letter { width:26px; height:26px; border-radius:50%; border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; flex-shrink:0; }
.option:hover { border-color:var(--brand-mid); background:var(--brand-light); }
.option.selected { border-color:var(--brand); background:var(--brand-light); }
.option.selected .option-letter { background:var(--brand); border-color:var(--brand); color:white; }
.option.correct { border-color:var(--success); background:var(--success-bg); }
.option.incorrect { border-color:var(--danger); background:var(--danger-bg); }
.short-answer { width:100%; padding:12px; border:2px solid var(--border); border-radius:var(--radius); resize:vertical; min-height:80px; transition:border-color .15s; }
.short-answer:focus { outline:none; border-color:var(--brand); }
.tf-options { display:flex; gap:12px; }
.tf-btn { flex:1; padding:14px; border:2px solid var(--border); border-radius:var(--radius); text-align:center; font-weight:600; cursor:pointer; transition:all .15s; }
.tf-btn:hover { border-color:var(--brand-mid); }
.tf-btn.selected { border-color:var(--brand); background:var(--brand-light); color:var(--brand); }

/* Assignment */
.assignment-card { border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; }
.assignment-head { padding:16px 20px; display:flex; align-items:center; justify-content:space-between; background:var(--surface-alt); border-bottom:1px solid var(--border); }
.assignment-body { padding:20px; }
.upload-zone { border:2px dashed var(--border); border-radius:var(--radius); padding:30px 20px; text-align:center; cursor:pointer; transition:all .2s; color:var(--text-2); }
.upload-zone:hover { border-color:var(--brand); color:var(--brand); background:var(--brand-light); }
.upload-zone .uz-icon { font-size:32px; margin-bottom:8px; }
.upload-zone .uz-label { font-size:14px; font-weight:500; }
.upload-zone .uz-sub { font-size:12px; color:var(--text-3); margin-top:4px; }
.uploaded-file { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--surface-alt); border-radius:var(--radius); margin-top:10px; border:1px solid var(--border); }
.file-icon { font-size:20px; }
.file-name { font-size:13px; font-weight:500; flex:1; }
.file-size { font-size:12px; color:var(--text-3); }

/* Analytics */
.analytics-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
.chart-area { height:160px; position:relative; display:flex; align-items:flex-end; gap:6px; padding:0 0 24px; }
.bar { flex:1; border-radius:4px 4px 0 0; background:var(--brand); opacity:.8; position:relative; cursor:pointer; transition:opacity .15s; min-height:4px; }
.bar:hover { opacity:1; }
.bar-label { position:absolute; bottom:-20px; left:50%; transform:translateX(-50%); font-size:10px; color:var(--text-3); white-space:nowrap; }
.bar-val { position:absolute; top:-18px; left:50%; transform:translateX(-50%); font-size:10px; font-weight:600; color:var(--brand); white-space:nowrap; }
.legend { display:flex; gap:14px; flex-wrap:wrap; margin-top:8px; }
.legend-item { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--text-2); }
.legend-dot { width:8px; height:8px; border-radius:50%; }
.progress-list { display:flex; flex-direction:column; gap:12px; }
.progress-row { display:flex; align-items:center; gap:10px; }
.pr-label { font-size:13px; font-weight:500; width:100px; flex-shrink:0; }
.pr-track { flex:1; height:6px; background:var(--border); border-radius:6px; overflow:hidden; }
.pr-fill { height:100%; border-radius:6px; background:var(--brand); }
.pr-pct { font-size:12px; font-weight:600; color:var(--text-2); width:34px; text-align:right; }
.heatmap { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
.heat-cell { aspect-ratio:1; border-radius:3px; }

/* Certificate */
.cert-preview { border:3px solid #c4a000; border-radius:var(--radius-lg); padding:36px; text-align:center; background:linear-gradient(135deg,#fffef0,#fffff8); position:relative; }
.cert-preview::before { content:''; position:absolute; inset:6px; border:1px solid #ddd0a0; border-radius:10px; pointer-events:none; }
.cert-logo { font-size:28px; font-weight:800; color:#c4a000; letter-spacing:-1px; margin-bottom:4px; }
.cert-title { font-size:11px; letter-spacing:3px; color:#a09060; text-transform:uppercase; margin-bottom:22px; }
.cert-body { font-size:13px; color:#665530; margin-bottom:8px; }
.cert-name { font-size:28px; font-weight:700; color:#3d2e00; margin:8px 0; font-family:Georgia,serif; font-style:italic; }
.cert-course { font-size:16px; font-weight:600; color:#3d2e00; margin:8px 0 20px; }
.cert-date { font-size:12px; color:#888060; margin-top:16px; }
.cert-seal { display:inline-flex; align-items:center; justify-content:center; width:56px; height:56px; background:#c4a000; border-radius:50%; color:white; font-size:24px; margin:0 auto; }

/* Discussion */
.thread-list { display:flex; flex-direction:column; gap:0; }
.thread-item { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; gap:12px; cursor:pointer; transition:background .15s; }
.thread-item:hover { background:var(--surface-alt); }
.thread-item:last-child { border-bottom:none; }
.thread-av { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:white; flex-shrink:0; }
.thread-content { flex:1; min-width:0; }
.thread-title { font-size:14px; font-weight:600; margin-bottom:3px; }
.thread-preview { font-size:12px; color:var(--text-2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.thread-meta { display:flex; gap:10px; align-items:center; margin-top:4px; }
.thread-meta span { font-size:11px; color:var(--text-3); }
.reply-input { display:flex; gap:10px; margin-top:12px; }
.reply-input input { flex:1; padding:9px 13px; border:1px solid var(--border); border-radius:var(--radius); background:var(--surface-alt); }
.reply-input input:focus { outline:none; border-color:var(--brand); background:var(--surface); }

/* Form elements */
.form-group { margin-bottom:18px; }
.form-label { display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:var(--text); }
.form-input { width:100%; padding:10px 13px; border:1px solid var(--border); border-radius:var(--radius); background:var(--surface); transition:border-color .15s; }
.form-input:focus { outline:none; border-color:var(--brand); }
.form-select { width:100%; padding:10px 13px; border:1px solid var(--border); border-radius:var(--radius); background:var(--surface); }
.form-hint { font-size:12px; color:var(--text-3); margin-top:4px; }

/* Tables */
.data-table { width:100%; border-collapse:collapse; }
.data-table th { background:var(--surface-alt); padding:10px 14px; text-align:left; font-size:12px; font-weight:600; color:var(--text-2); text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); }
.data-table td { padding:12px 14px; border-bottom:1px solid var(--border); font-size:14px; }
.data-table tr:last-child td { border-bottom:none; }
.data-table tr:hover td { background:var(--surface-alt); }

/* Auth */
.auth-page { min-height:100vh; display:flex; background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%); }
.auth-left { flex:1; display:flex; flex-direction:column; justify-content:center; padding:60px; color:white; }
.auth-left h1 { font-size:42px; font-weight:800; letter-spacing:-1.5px; margin-bottom:12px; }
.auth-left p { font-size:17px; opacity:.8; max-width:400px; line-height:1.6; }
.auth-features { margin-top:40px; display:flex; flex-direction:column; gap:14px; }
.auth-feature { display:flex; align-items:center; gap:12px; font-size:15px; }
.auth-feature-icon { width:32px; height:32px; background:rgba(255,255,255,.15); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.auth-right { width:480px; background:white; display:flex; align-items:center; justify-content:center; padding:48px; }
.auth-form { width:100%; max-width:360px; }
.auth-form h2 { font-size:24px; font-weight:700; margin-bottom:6px; }
.auth-form .auth-sub { color:var(--text-2); margin-bottom:28px; font-size:15px; }

/* Toast */
.toast { position:fixed; bottom:24px; right:24px; background:var(--text); color:white; padding:12px 20px; border-radius:var(--radius); font-size:14px; z-index:9999; max-width:340px; animation:toastIn .25s ease; }
.toast.success { background:var(--success); }
.toast.danger { background:var(--danger); }
@keyframes toastIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

/* Tabs */
.tabs { display:flex; gap:2px; background:var(--surface-alt); border-radius:var(--radius); padding:3px; width:fit-content; margin-bottom:20px; }
.tab { padding:7px 16px; border-radius:7px; font-size:14px; font-weight:500; border:none; background:none; color:var(--text-2); cursor:pointer; transition:all .15s; }
.tab.active { background:var(--surface); color:var(--text); box-shadow:0 1px 3px rgba(0,0,0,.1); }

/* Divider */
.divider { height:1px; background:var(--border); margin:20px 0; }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:500; display:flex; align-items:center; justify-content:center; padding:20px; }
.modal { background:white; border-radius:var(--radius-lg); padding:28px; max-width:520px; width:100%; box-shadow:var(--shadow-md); }
.modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.modal-title { font-size:17px; font-weight:600; }

/* Result screen */
.result-screen { text-align:center; padding:40px 20px; }
.result-score-circle { width:120px; height:120px; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; margin:0 auto 20px; font-weight:700; border:6px solid; }
.result-score-circle.pass { border-color:var(--success); color:var(--success); }
.result-score-circle.fail { border-color:var(--danger); color:var(--danger); }
.result-pct { font-size:30px; line-height:1; }
.result-status { font-size:12px; margin-top:4px; }

/* Notification dot */
.notif-dot { width:7px; height:7px; background:var(--danger); border-radius:50%; display:inline-block; margin-left:4px; vertical-align:middle; }

/* Responsive helpers */
@media(max-width:900px) {
  .lesson-layout { grid-template-columns:1fr; }
  .analytics-grid { grid-template-columns:1fr; }
  .auth-left { display:none; }
  .auth-right { width:100%; }
  .sidebar { transform:translateX(-100%); }
  .main { margin-left:0; }
  .sidebar.open { transform:none; }
}

/* Scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:6px; }

/* AI badge */
.ai-badge { background:linear-gradient(135deg,#4f46e5,#7c3aed); color:white; font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; letter-spacing:.3px; }
</style>
</head>
<body>
<div id="root"></div>

async function apiCall(data) {
  try {
    if (!data.action || data.action === "fetch") {
      const r = await fetch(API_URL + "?t=" + Date.now());
      const result = await r.json();
      if (result && result.users) {
        const adminUser = G.users.find(u => u.role === "admin");
        const apiUsers = result.users.filter(u => u.email !== "admin@learnflow.com");
        G.users = adminUser ? [adminUser, ...apiUsers] : apiUsers;
      }
      return result;
    }
    await fetch(API_URL, { method:"POST", mode:"no-cors", headers:{"Content-Type":"application/json"}, body: JSON.stringify(data) });
    return { success: true };
  } catch(e) { 
    console.log("API error:", e);
    return { error: e.message }; 
  }
}

async function syncUsers() {
  try {
    const res = await apiCall({ action: "fetch" });
    const adminExists = G.users.some(u => u.role === "admin");
    if (!adminExists) {
      G.users.unshift({
        id: 1,
        name: "Admin User",
        email: "admin@learnflow.com",
        password: "admin111",
        role: "admin",
        status: "approved",
        points: 0,
        registeredAt: Date.now()
      });
    }
  } catch(e) {
    console.log("Error syncing users:", e);
  }
}

function toast(msg, type = "") {
  const el = document.createElement("div");
  el.className = "toast" + (type ? " " + type : "");
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

function re(id, html) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = html;
}

function render() {
  const root = document.getElementById("root");
  if (G.view === "auth") { root.innerHTML = authView(); bindAuth(); return; }

  const content = document.getElementById("page-content");

  else if (G.view === "admin") content.innerHTML = adminView();

function bindAuth() {
  const liBtn = document.getElementById("li-btn");
  if (liBtn) liBtn.onclick = async () => {
    const email = document.getElementById("li-email").value.trim();
    const pass = document.getElementById("li-pass").value;
    if (!email || !pass) { toast("Fill in all fields", "danger"); return; }
    liBtn.disabled = true; liBtn.textContent = "Signing in…";
    await syncUsers();
    const u = G.users.find(x => x.email === email && x.password === pass && x.role === "student");
    if (!u) { toast("Invalid credentials", "danger"); liBtn.disabled=false; liBtn.textContent="Sign in"; return; }
    if (u.status !== "approved") { toast("Account pending admin approval", "danger"); liBtn.disabled=false; liBtn.textContent="Sign in"; return; }
    G.user = u; sessionStorage.setItem("lf_user", JSON.stringify(u));
    G.view = "home"; render(); toast("Welcome back, " + u.name.split(" ")[0] + "!");
  };
  const rgBtn = document.getElementById("rg-btn");
  if (rgBtn) rgBtn.onclick = async () => {
    const name = document.getElementById("rg-name").value.trim();
    const email = document.getElementById("rg-email").value.trim();
    const pass = document.getElementById("rg-pass").value;
    if (!name || !email || !pass) { toast("Fill in all fields", "danger"); return; }
    rgBtn.disabled = true; rgBtn.textContent = "Creating…";
    const newUser = { id: G.users.length + 1, name, email, password: pass, role: "student", status: "pending", points: 0, registeredAt: Date.now() };
    G.users.push(newUser);
    await apiCall({ action:"register", name, email, password:pass });
    toast("Account created! Await admin approval.", "success");
    showLogin();
  };
  const admBtn = document.getElementById("adm-btn");
  if (admBtn) admBtn.onclick = async () => {
    const email = document.getElementById("adm-email").value.trim();
    const pass = document.getElementById("adm-pass").value;
    admBtn.disabled = true; admBtn.textContent = "Signing in…";
    await syncUsers();
    const a = G.users.find(x => x.email === email && x.password === pass && x.role === "admin");
    if (!a) { toast("Invalid admin credentials", "danger"); admBtn.disabled=false; admBtn.textContent="Admin sign in"; return; }
    G.user = a; sessionStorage.setItem("lf_user", JSON.stringify(a));
    G.view = "admin"; render();
  };
}

}

function initQuiz() {
  const allQ = [...QUIZ_BANK.mcq, ...QUIZ_BANK.tf, ...QUIZ_BANK.short];
  G.quizState = {
    questions: allQ,
    current: 0,
    answers: {},
    timeLeft: 600,
    started: Date.now(),
    finished: false,
    timer: null
  };
}

function quizView() {
  if (!G.quizState) initQuiz();
  const qs = G.quizState;
  if (qs.finished) return quizResultView();

  const q = qs.questions[qs.current];
  const mins = Math.floor(qs.timeLeft / 60);
  const secs = qs.timeLeft % 60;
  const timerDanger = qs.timeLeft < 120;

  return `
  <div class="quiz-wrap">
    <div class="quiz-header">
      <div>
        <button class="btn btn-secondary btn-sm" onclick="G.view='lesson';render()">← Exit quiz</button>
      </div>
      <div class="timer-pill ${timerDanger?'danger':''}" id="quiz-timer">⏱ ${mins}:${secs.toString().padStart(2,"0")}</div>
    </div>
    <div class="progress-steps">
      ${qs.questions.map((_, i) => `<div class="progress-step ${i<qs.current?'done':i===qs.current?'current':''}"></div>`).join("")}
    </div>
    <div class="question-card">
      <div class="question-label">Question ${qs.current+1} of ${qs.questions.length} · <span class="badge badge-brand" style="font-size:10px">${q.type==='mcq'?'Multiple choice':q.type==='tf'?'True / False':'Short answer'}</span> · ${q.points} pts</div>
      <div class="question-text">${q.text}</div>
      ${q.type === "mcq" ? mcqOptions(q, qs) : ""}
      ${q.type === "tf" ? tfOptions(q, qs) : ""}
      ${q.type === "short" ? shortInput(q, qs) : ""}
    </div>
    <div style="display:flex;justify-content:space-between">
      <button class="btn btn-secondary" ${qs.current===0?"disabled":""} onclick="quizNav(-1)">← Previous</button>
      <button class="btn btn-primary" onclick="quizNav(1)">${qs.current===qs.questions.length-1?"Submit quiz":"Next →"}</button>
    </div>
  </div>`;
}

function mcqOptions(q, qs) {
  return q.options.map((opt, i) => {
    const sel = qs.answers[qs.current] === i;
    return `<div class="option ${sel?'selected':''}" onclick="selectMcq(${i})">
      <div class="option-letter">${String.fromCharCode(65+i)}</div>${opt}
    </div>`;
  }).join("");
}

function tfOptions(q, qs) {
  const ans = qs.answers[qs.current];
  return `<div class="tf-options">
    <div class="tf-btn ${ans===true?'selected':''}" onclick="selectTF(true)">✓ True</div>
    <div class="tf-btn ${ans===false?'selected':''}" onclick="selectTF(false)">✗ False</div>
  </div>`;
}

function shortInput(q, qs) {
  return `<textarea class="short-answer" placeholder="Type your answer here…" id="short-ans" onchange="G.quizState.answers[G.quizState.current]=this.value">${qs.answers[qs.current]||""}</textarea>
  <div style="font-size:12px;color:var(--text-3);margin-top:6px">Sample: ${q.sampleAnswer}</div>`;
}

function selectMcq(i) { G.quizState.answers[G.quizState.current] = i; re("page-content", quizView()); bindQuiz(); }
function selectTF(v) { G.quizState.answers[G.quizState.current] = v; re("page-content", quizView()); bindQuiz(); }

function quizNav(dir) {
  const qs = G.quizState;
  const shortEl = document.getElementById("short-ans");
  if (shortEl) qs.answers[qs.current] = shortEl.value;
  if (dir === 1 && qs.current === qs.questions.length - 1) { finishQuiz(); return; }
  qs.current = Math.max(0, Math.min(qs.questions.length - 1, qs.current + dir));
  re("page-content", quizView()); bindQuiz();
}

function bindQuiz() {
  if (G.quizState && !G.quizState.finished && !G.quizState.timer) {
    G.quizState.timer = setInterval(() => {
      if (!G.quizState) return;
      G.quizState.timeLeft--;
      const el = document.getElementById("quiz-timer");
      if (el) {
        const m = Math.floor(G.quizState.timeLeft/60), s = G.quizState.timeLeft%60;
        el.textContent = "⏱ "+m+":"+s.toString().padStart(2,"0");
        if (G.quizState.timeLeft < 120) el.classList.add("danger");
      }
      if (G.quizState.timeLeft <= 0) { clearInterval(G.quizState.timer); finishQuiz(); }
    }, 1000);
  }
}

function finishQuiz() {
  if (G.quizState.timer) clearInterval(G.quizState.timer);
  G.quizState.finished = true;
  let score = 0, total = 0;
  G.quizState.questions.forEach((q, i) => {
    total += q.points;
    if (q.type === "mcq" && G.quizState.answers[i] === q.correct) score += q.points;
    if (q.type === "tf" && G.quizState.answers[i] === q.correct) score += q.points;
    if (q.type === "short" && G.quizState.answers[i]) score += Math.floor(q.points * 0.7);
  });
  G.quizState.score = score; G.quizState.total = total;
  const pct = Math.round(score/total*100);
  G.quizState.pct = pct;
  if (pct >= 60 && G.user) { G.user.points = (G.user.points||0) + score; sessionStorage.setItem("lf_user", JSON.stringify(G.user)); }
  const qKey = G.currentCourse ? G.currentCourse.id : "standalone";
  G.quizResults[qKey] = { score, total, pct };
  re("page-content", quizResultView());
}

function quizResultView() {
  const qs = G.quizState;
  const pass = qs.pct >= 60;
  return `
  <div class="quiz-wrap result-screen">
    <div class="result-score-circle ${pass?'pass':'fail'}">
      <div class="result-pct">${qs.pct}%</div>
      <div class="result-status">${pass?'PASSED':'FAILED'}</div>
    </div>
    <h2 style="margin-bottom:6px">${pass?'Great work! 🎉':'Keep practicing 💪'}</h2>
    <p style="color:var(--text-2);margin-bottom:20px">You scored ${qs.score} out of ${qs.total} points</p>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      ${pass ? `<button class="btn btn-success" onclick="G.view='certificates';render()">🏆 View certificate</button>` : `<button class="btn btn-primary" onclick="initQuiz();G.view='quiz';render()">Retry quiz</button>`}
      <button class="btn btn-secondary" onclick="G.view='home';render()">Back to home</button>
    </div>
    ${pass ? `<div style="margin-top:20px;padding:14px;background:var(--success-bg);border-radius:var(--radius);color:var(--success);font-size:14px">+${qs.score} points added to your profile!</div>` : ""}
  </div>`;
}

        <span>${d.author}</span>
        <span>💬 ${d.replies}</span>
        <span>↑ ${d.votes}</span>
        <span>${d.time}</span>
      </div>
    </div>
  </div>`;
}

function openThread(id) {
  const d = DISCUSSIONS.find(x => x.id === id);
  document.getElementById("disc-modal").innerHTML = `
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:12px">
      <h3 style="font-size:16px;max-width:80%">${d.title}</h3>
      <button class="btn btn-secondary btn-sm" onclick="document.getElementById('disc-modal').innerHTML=''">✕</button>
    </div>
    <p style="color:var(--text-2);font-size:14px;line-height:1.7;margin-bottom:16px">${d.preview} Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
    <div style="font-size:12px;color:var(--text-3);display:flex;gap:12px">
      <span>Posted by ${d.author}</span><span>${d.time}</span><span>💬 ${d.replies} replies</span>
    </div>
    <div class="divider"></div>
    <div class="reply-input">
      <input id="reply-field" placeholder="Write a reply…">
      <button class="btn btn-primary btn-sm" onclick="postReply()">Reply</button>
    </div>
  </div>`;
}

function showNewThread() {
  document.getElementById("disc-modal").innerHTML = `
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;margin-bottom:16px">
      <h3>New discussion</h3>
      <button class="btn btn-secondary btn-sm" onclick="document.getElementById('disc-modal').innerHTML=''">✕</button>
    </div>
    <div class="form-group"><label class="form-label">Title</label><input class="form-input" placeholder="What's your question or topic?" id="nt-title"></div>
    <div class="form-group"><label class="form-label">Message</label><textarea class="short-answer" placeholder="Provide details…" style="min-height:100px" id="nt-body"></textarea></div>
    <button class="btn btn-primary" onclick="submitThread()">Post discussion</button>
  </div>`;
}

function postReply() { toast("Reply posted!"); document.getElementById("reply-field").value = ""; }
function submitThread() { toast("Discussion posted!", "success"); document.getElementById("disc-modal").innerHTML = ""; }
function bindDiscussion() {}

// ===========================================
// CERTIFICATES
// ===========================================
function certificatesView() {
  const earned = COURSES.filter(c => G.enrollments[c.id]);
  return `
  <p style="color:var(--text-2);margin-bottom:20px;font-size:15px">Complete a course to earn a verified certificate.</p>
  ${earned.length === 0 ? `<div class="card" style="text-align:center;padding:48px;color:var(--text-2)">
    <div style="font-size:48px;margin-bottom:12px">🏆</div>
    <p>Enroll in and complete a course to earn your first certificate.</p>
    <button class="btn btn-primary" style="margin-top:16px" onclick="G.view='catalog';render()">Browse courses</button>
  </div>` : `
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px">
    ${earned.map(c => `
    <div>
      <div class="cert-preview">
        <div class="cert-logo">LearnFlow</div>
        <div class="cert-title">Certificate of Completion</div>
        <div class="cert-body">This certifies that</div>
        <div class="cert-name">${G.user ? G.user.name : "Student"}</div>
        <div class="cert-body">has successfully completed</div>
        <div class="cert-course">${c.title}</div>
        <div class="cert-seal">✓</div>
        <div class="cert-date">Issued ${new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"})}</div>
      </div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn btn-primary btn-sm" onclick="toast('Certificate downloaded!','success')">⬇ Download PDF</button>
        <button class="btn btn-secondary btn-sm" onclick="toast('Link copied!')">🔗 Share link</button>
      </div>
    </div>`).join("")}
  </div>`}`;
}

// ===========================================
// ADMIN DASHBOARD
// ===========================================
function adminView() {
  const students = G.users.filter(u => u.role === "student");
  const pending = students.filter(u => u.status === "pending");
  const approved = students.filter(u => u.status === "approved");

  return `
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" style="color:var(--brand)">${students.length}</div><div class="stat-label">Total students</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--warn)">${pending.length}</div><div class="stat-label">Pending approval</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--success)">${approved.length}</div><div class="stat-label">Active students</div></div>
    <div class="stat-card"><div class="stat-num">${COURSES.length}</div><div class="stat-label">Published courses</div></div>
  </div>
  <div class="tabs">
    <button class="tab ${G.adminTab==='users'?'active':''}" onclick="G.adminTab='users';re('admin-content',adminContent())">Users</button>
    <button class="tab ${G.adminTab==='courses'?'active':''}" onclick="G.adminTab='courses';re('admin-content',adminContent())">Courses</button>
    <button class="tab ${G.adminTab==='analytics'?'active':''}" onclick="G.adminTab='analytics';re('admin-content',adminContent())">Analytics</button>
  </div>
  <div id="admin-content">${adminContent()}</div>`;
}

function adminContent() {
  if (G.adminTab === "users") {
    const students = G.users.filter(u => u.role === "student");
    const pending = students.filter(u => u.status === "pending");
    return `
    ${pending.length > 0 ? `
    <div class="card" style="margin-bottom:16px;border-color:var(--warn)">
      <div class="section-header">
        <div class="section-title">⏳ Pending approvals <span class="badge badge-warn">${pending.length}</span></div>
      </div>
      <table class="data-table">
        <thead><tr><th>Name</th><th>Email</th><th>Registered</th><th>Action</th></tr></thead>
        <tbody>
          ${pending.map(u => `<tr>
            <td><div style="display:flex;align-items:center;gap:8px"><div class="avatar" style="width:28px;height:28px;font-size:11px">${u.name.slice(0,2).toUpperCase()}</div>${u.name}</div></td>
            <td style="color:var(--text-2)">${u.email}</td>
            <td style="color:var(--text-3)">${new Date(u.registeredAt||Date.now()).toLocaleDateString()}</td>
            <td>
              <button class="btn btn-success btn-sm" onclick="approveUser(${u.id})">Approve</button>
              <button class="btn btn-danger btn-sm" style="margin-left:4px" onclick="toast('User rejected')">Reject</button>
            </td>
          </tr>`).join("")}
        </tbody>
      </table>
    </div>` : `<div class="card" style="margin-bottom:16px;text-align:center;padding:20px;color:var(--success)">✓ No pending approvals</div>`}
    <div class="card">
      <div class="section-header"><div class="section-title">All students (${students.length})</div>
        <input class="form-input" style="max-width:220px" placeholder="Search…" id="user-search">
      </div>
      <table class="data-table">
        <thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Points</th></tr></thead>
        <tbody>
          ${students.length === 0 ? `<tr><td colspan="4" style="text-align:center;color:var(--text-3);padding:24px">No students registered yet</td></tr>` :
          students.map(u => `<tr>
            <td>${u.name}</td><td style="color:var(--text-2)">${u.email}</td>
            <td><span class="badge ${u.status==='approved'?'badge-success':'badge-warn'}">${u.status}</span></td>
            <td>${u.points||0}</td>
          </tr>`).join("")}
        </tbody>
      </table>
    </div>`;
  }
  if (G.adminTab === "courses") {
    return `<div class="card">
      <div class="section-header">
        <div class="section-title">Published courses</div>
        <button class="btn btn-primary btn-sm" onclick="toast('Course builder coming soon!')">+ Add course</button>
      </div>
      <table class="data-table">
        <thead><tr><th>Course</th><th>Instructor</th><th>Students</th><th>Rating</th><th>Status</th></tr></thead>
        <tbody>
          ${COURSES.map(c => `<tr>
            <td><div style="font-weight:500">${c.title}</div><div style="font-size:12px;color:var(--text-3)">${c.category}</div></td>
            <td>${c.instructor}</td>
            <td>${c.students.toLocaleString()}</td>
            <td>⭐ ${c.rating}</td>
            <td><span class="badge badge-success">Published</span></td>
          </tr>`).join("")}
        </tbody>
      </table>
    </div>`;
  }
  if (G.adminTab === "analytics") {
    return `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px">
      <div class="stat-card"><div class="stat-num" style="color:var(--brand)">${G.users.filter(u=>u.role==='student').length * 3 || 0}</div><div class="stat-label">Total enrollments</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--success)">78%</div><div class="stat-label">Avg completion rate</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--warn)">4.8</div><div class="stat-label">Platform rating</div></div>
      <div class="stat-card"><div class="stat-num">$${(COURSES.reduce((s,c)=>s+c.students*c.price/100,0)).toFixed(0)}K</div><div class="stat-label">Est. revenue</div></div>
    </div>
    <div class="card" style="margin-top:16px">
      <div class="section-title" style="margin-bottom:16px">Enrollment by course</div>
      <div class="progress-list">
        ${COURSES.map(c => `<div class="progress-row">
          <div class="pr-label" style="font-size:12px;width:140px">${c.title.slice(0,18)}…</div>
          <div class="pr-track"><div class="pr-fill" style="width:${Math.round(c.students/3102*100)}%"></div></div>
          <div class="pr-pct">${c.students.toLocaleString()}</div>
        </div>`).join("")}
      </div>
    </div>`;
  }
  return "";
}

function bindAdmin() {}

async function approveUser(id) {
  const u = G.users.find(x => x.id === id);
  if (u) {
    u.status = "approved";
    toast(u.name + " approved!", "success");
    await syncUsers();
    re("admin-content", adminContent());
  }
}

// ===========================================
// INIT
// ===========================================
async function init() {
  const saved = sessionStorage.getItem("lf_user");
  if (saved) {
    G.user = JSON.parse(saved);
    await syncUsers();
    if (G.user.role === "admin") G.view = "admin";
    else { const u = G.users.find(x => x.id === G.user.id); if (u && u.status === "approved") G.view = "home"; else { sessionStorage.removeItem("lf_user"); G.view = "auth"; } }
  }
  render();
}
init();
</script>
</body>
</html>
