<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnFlow Pro — Advanced Learning Management System</title>
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<style>
:root {
  --brand: #4f46e5;
  --brand-light: #eef2ff;
  --brand-mid: #818cf8;
  --surface: #ffffff;
  --surface-alt: #f8fafc;
  --surface-hover: #f1f5f9;
  --border: #e2e8f0;
  --border-strong: #cbd5e1;
  --text: #0f172a;
  --text-2: #475569;
  --text-3: #94a3b8;
  --success: #16a34a;
  --success-bg: #f0fdf4;
  --warn: #d97706;
  --warn-bg: #fffbeb;
  --danger: #dc2626;
  --danger-bg: #fef2f2;
  --info: #0284c7;
  --info-bg: #f0f9ff;
  --radius: 10px;
  --radius-lg: 16px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.10);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background:#f1f5f9; color:var(--text); min-height:100vh; font-size:15px; line-height:1.6; }
a { color:var(--brand); text-decoration:none; }
button { cursor:pointer; font-family:inherit; font-size:15px; }
input, textarea, select { font-family:inherit; font-size:15px; }
h1,h2,h3,h4 { font-weight:600; line-height:1.3; }

/* Layout */
.app-shell { display:flex; min-height:100vh; }
.sidebar { width:280px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:100; transition:transform .25s; overflow-y:auto; }
.sidebar-logo { padding:20px 20px 16px; border-bottom:1px solid var(--border); }
.sidebar-logo .wordmark { font-size:20px; font-weight:800; color:var(--brand); letter-spacing:-.3px; }
.sidebar-logo .tagline { font-size:11px; color:var(--text-3); margin-top:2px; }
.sidebar-nav { flex:1; padding:12px 10px; }
.nav-section-label { font-size:10px; font-weight:600; color:var(--text-3); letter-spacing:.8px; text-transform:uppercase; padding:12px 10px 6px; }
.nav-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:var(--radius); color:var(--text-2); font-size:14px; font-weight:500; cursor:pointer; transition:all .15s; margin-bottom:2px; border:none; background:none; width:100%; text-align:left; }
.nav-item:hover { background:var(--surface-alt); color:var(--text); }
.nav-item.active { background:var(--brand-light); color:var(--brand); }
.nav-item .nav-icon { font-size:18px; width:22px; flex-shrink:0; }
.nav-badge { margin-left:auto; background:var(--brand); color:white; font-size:10px; font-weight:700; padding:1px 6px; border-radius:20px; min-width:18px; text-align:center; }
.sidebar-footer { padding:12px; border-top:1px solid var(--border); }
.user-pill { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:var(--radius); background:var(--surface-alt); }
.avatar { width:36px; height:36px; border-radius:50%; background:var(--brand); color:white; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:600; flex-shrink:0; }
.user-pill .uname { font-size:14px; font-weight:600; line-height:1.2; }
.user-pill .urole { font-size:11px; color:var(--text-3); }
.logout-btn { font-size:12px; color:var(--text-3); background:none; border:none; cursor:pointer; padding:0; display:block; margin-top:4px; text-align:left; }
.logout-btn:hover { color:var(--danger); }

.main { margin-left:280px; flex:1; min-height:100vh; }
.topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 28px; height:60px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
.topbar-title { font-size:18px; font-weight:600; }
.topbar-actions { display:flex; align-items:center; gap:12px; }
.content-area { padding:28px; max-width:1400px; margin:0 auto; }

/* Buttons */
.btn { display:inline-flex; align-items:center; gap:7px; padding:9px 18px; border-radius:var(--radius); font-weight:500; font-size:14px; border:1px solid transparent; transition:all .15s; cursor:pointer; }
.btn-primary { background:var(--brand); color:white; border-color:var(--brand); }
.btn-primary:hover { background:#4338ca; transform:translateY(-1px); }
.btn-secondary { background:var(--surface); color:var(--text); border-color:var(--border); }
.btn-secondary:hover { background:var(--surface-alt); }
.btn-danger { background:var(--danger); color:white; }
.btn-danger:hover { background:#b91c1c; }
.btn-success { background:var(--success); color:white; }
.btn-success:hover { background:#15803d; }
.btn-sm { padding:5px 12px; font-size:13px; }
.btn:disabled { opacity:.5; cursor:not-allowed; }

/* Cards */
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:24px; margin-bottom:20px; }
.card-sm { padding:16px; }
.section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
.section-title { font-size:18px; font-weight:600; }

/* Stats */
.stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:28px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px; transition:all .2s; }
.stat-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); }
.stat-num { font-size:32px; font-weight:800; line-height:1; margin-bottom:6px; }
.stat-label { font-size:13px; color:var(--text-2); }
.stat-trend { font-size:12px; margin-top:8px; color:var(--success); }

/* Badges */
.badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:600; }
.badge-success { background:var(--success-bg); color:var(--success); }
.badge-warn { background:var(--warn-bg); color:var(--warn); }
.badge-danger { background:var(--danger-bg); color:var(--danger); }
.badge-info { background:var(--info-bg); color:var(--info); }
.badge-brand { background:var(--brand-light); color:var(--brand); }
.badge-gray { background:#f1f5f9; color:var(--text-2); }

/* Course Cards */
.courses-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:24px; }
.course-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; cursor:pointer; transition:all .25s; }
.course-card:hover { box-shadow:var(--shadow-md); transform:translateY(-4px); border-color:var(--brand-mid); }
.course-thumb { height:160px; display:flex; align-items:center; justify-content:center; font-size:48px; position:relative; background-size:cover; }
.course-body { padding:20px; }
.course-title { font-size:18px; font-weight:700; margin-bottom:8px; }
.course-meta { font-size:13px; color:var(--text-2); display:flex; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
.course-progress { height:6px; background:#e2e8f0; border-radius:6px; overflow:hidden; margin:12px 0; }
.course-progress-bar { height:100%; background:var(--brand); border-radius:6px; transition:width .4s; }
.course-footer { padding:12px 20px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; background:var(--surface-alt); }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1000; display:none; align-items:center; justify-content:center; }
.modal-overlay.active { display:flex; }
.modal { background:white; border-radius:var(--radius-lg); padding:28px; max-width:650px; width:90%; max-height:85vh; overflow-y:auto; }
.modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; padding-bottom:12px; border-bottom:1px solid var(--border); }
.modal-title { font-size:20px; font-weight:700; }
.modal-close { background:none; border:none; font-size:28px; cursor:pointer; color:var(--text-3); line-height:1; }

/* Forms */
.form-group { margin-bottom:20px; }
.form-label { display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:var(--text); }
.form-input, .form-select, .form-textarea { width:100%; padding:10px 14px; border:1.5px solid var(--border); border-radius:var(--radius); background:var(--surface); transition:border-color .15s; font-size:14px; }
.form-input:focus, .form-select:focus, .form-textarea:focus { outline:none; border-color:var(--brand); }
.form-textarea { resize:vertical; min-height:100px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }

/* Tables */
.table-wrapper { overflow-x:auto; border-radius:var(--radius-lg); border:1px solid var(--border); background:var(--surface); }
.data-table { width:100%; border-collapse:collapse; }
.data-table th { background:var(--surface-alt); padding:14px 16px; text-align:left; font-size:12px; font-weight:600; color:var(--text-2); text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); }
.data-table td { padding:14px 16px; border-bottom:1px solid var(--border); font-size:14px; }
.data-table tr:last-child td { border-bottom:none; }
.data-table tr:hover td { background:var(--surface-alt); }
.actions-cell { display:flex; gap:8px; flex-wrap:wrap; }

/* Lesson/Module Items */
.module-item { background:var(--surface-alt); border-radius:var(--radius-lg); margin-bottom:16px; overflow:hidden; }
.module-header { padding:16px 20px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
.module-header:hover { background:var(--surface-hover); }
.module-title { font-weight:600; font-size:16px; }
.lesson-item { padding:12px 20px 12px 40px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; cursor:pointer; transition:background .15s; }
.lesson-item:hover { background:var(--surface-alt); }
.lesson-icon { font-size:16px; width:24px; }
.lesson-title { flex:1; font-size:14px; }
.lesson-duration { font-size:12px; color:var(--text-3); }
.lesson-type { font-size:11px; padding:2px 8px; border-radius:12px; background:var(--brand-light); color:var(--brand); }

/* Quiz Options */
.quiz-option { padding:12px 16px; border:2px solid var(--border); border-radius:var(--radius); margin-bottom:10px; cursor:pointer; transition:all .15s; }
.quiz-option:hover { border-color:var(--brand-mid); background:var(--brand-light); }
.quiz-option.selected { border-color:var(--brand); background:var(--brand-light); }
.quiz-option.correct { border-color:var(--success); background:var(--success-bg); }
.quiz-option.wrong { border-color:var(--danger); background:var(--danger-bg); }

/* Toast */
.toast { position:fixed; bottom:24px; right:24px; background:var(--text); color:white; padding:12px 20px; border-radius:var(--radius); font-size:14px; z-index:9999; max-width:340px; animation:toastIn .25s ease; box-shadow:var(--shadow-md); }
.toast.success { background:var(--success); }
.toast.danger { background:var(--danger); }
.toast.info { background:var(--info); }
@keyframes toastIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

/* Auth */
.auth-page { min-height:100vh; display:flex; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); }
.auth-left { flex:1; display:flex; flex-direction:column; justify-content:center; padding:60px; color:white; }
.auth-left h1 { font-size:48px; font-weight:800; letter-spacing:-1.5px; margin-bottom:16px; }
.auth-left p { font-size:18px; opacity:.9; max-width:450px; line-height:1.6; }
.auth-features { margin-top:50px; display:flex; flex-direction:column; gap:16px; }
.auth-feature { display:flex; align-items:center; gap:14px; font-size:16px; }
.auth-feature-icon { width:36px; height:36px; background:rgba(255,255,255,.2); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.auth-right { width:500px; background:white; display:flex; align-items:center; justify-content:center; padding:48px; border-radius:20px 0 0 20px; }
.auth-form { width:100%; max-width:380px; }
.auth-form h2 { font-size:28px; font-weight:700; margin-bottom:8px; }
.auth-form .auth-sub { color:var(--text-2); margin-bottom:32px; font-size:15px; }

/* Tabs */
.tabs { display:flex; gap:4px; background:var(--surface-alt); border-radius:var(--radius); padding:4px; width:fit-content; margin-bottom:24px; }
.tab { padding:8px 20px; border-radius:8px; font-size:14px; font-weight:500; border:none; background:none; color:var(--text-2); cursor:pointer; transition:all .15s; }
.tab.active { background:var(--surface); color:var(--text); box-shadow:var(--shadow); }

/* Loading */
.loading { text-align:center; padding:60px; color:var(--text-3); }
.spinner { width:50px; height:50px; border:3px solid var(--border); border-top-color:var(--brand); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 20px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Utility */
.text-center { text-align:center; }
.text-muted { color:var(--text-3); }
.mt-2 { margin-top:8px; }
.mt-3 { margin-top:12px; }
.mt-4 { margin-top:16px; }
.mb-2 { margin-bottom:8px; }
.mb-3 { margin-bottom:12px; }
.mb-4 { margin-bottom:16px; }
.flex { display:flex; }
.items-center { align-items:center; }
.justify-between { justify-content:space-between; }
.gap-2 { gap:8px; }
.gap-3 { gap:12px; }
.w-full { width:100%; }

@media (max-width:768px) {
  .sidebar { transform:translateX(-100%); position:fixed; }
  .sidebar.open { transform:none; }
  .main { margin-left:0; }
  .auth-left { display:none; }
  .auth-right { width:100%; border-radius:0; }
  .stats-row { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<div id="root"></div>

<script>
// ============================================
// FIREBASE CONFIGURATION
// ============================================
const firebaseConfig = {
  apiKey: "AIzaSyABRGIhbtThA7o141zlPSLIpeMZcvAdFvo",
  authDomain: "learnflow-lms-8cc2b.firebaseapp.com",
  projectId: "learnflow-lms-8cc2b",
  storageBucket: "learnflow-lms-8cc2b.firebasestorage.app",
  messagingSenderId: "744393992645",
  appId: "1:744393992645:web:3d60e095c2a407ff1983ac"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ============================================
// GLOBAL STATE
// ============================================
let G = {
  view: "auth",
  user: null,
  users: [],
  courses: [],
  enrollments: {},
  completedLessons: {},
  quizResults: {},
  assignmentSubmissions: {},
  currentCourse: null,
  currentModule: null,
  currentLesson: null,
  quizState: null,
  adminTab: "overview",
  courseTab: "overview",
  loading: false,
  selectedCourseForEdit: null,
  selectedModuleForEdit: null
};

// ============================================
// HELPER FUNCTIONS
// ============================================
function toast(msg, type = "info") {
  const el = document.createElement("div");
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${type === 'success' ? '✓' : type === 'danger' ? '⚠' : 'ℹ'}</span> ${msg}`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

function showLoading() { G.loading = true; render(); }
function hideLoading() { G.loading = false; render(); }

function openModal(title, contentHtml) {
  const modal = document.getElementById('customModal');
  if (!modal) {
    const div = document.createElement('div');
    div.id = 'customModal';
    div.className = 'modal-overlay';
    div.innerHTML = `<div class="modal"><div class="modal-header"><span class="modal-title"></span><button class="modal-close" onclick="closeModal()">×</button></div><div class="modal-body"></div></div>`;
    document.body.appendChild(div);
  }
  const modal = document.getElementById('customModal');
  modal.querySelector('.modal-title').textContent = title;
  modal.querySelector('.modal-body').innerHTML = contentHtml;
  modal.classList.add('active');
}

function closeModal() {
  const modal = document.getElementById('customModal');
  if (modal) modal.classList.remove('active');
}

// ============================================
// FIREBASE DATA OPERATIONS
// ============================================
async function loadAllData() {
  showLoading();
  try {
    const coursesSnapshot = await db.collection("courses").get();
    G.courses = [];
    coursesSnapshot.forEach(doc => {
      G.courses.push({ id: doc.id, ...doc.data() });
    });
    
    if (G.user && G.user.role === "admin") {
      const usersSnapshot = await db.collection("users").get();
      G.users = [];
      usersSnapshot.forEach(doc => {
        G.users.push({ id: doc.id, ...doc.data() });
      });
    }
    
    if (G.user && G.user.role === "student") {
      const progressDoc = await db.collection("progress").doc(G.user.id).get();
      if (progressDoc.exists) {
        const data = progressDoc.data();
        G.enrollments = data.enrollments || {};
        G.completedLessons = data.completedLessons || {};
        G.quizResults = data.quizResults || {};
        G.assignmentSubmissions = data.assignmentSubmissions || {};
        G.user.points = data.points || 0;
      }
    }
  } catch (error) {
    console.error("Error loading data:", error);
    toast("Error connecting to database", "danger");
  }
  hideLoading();
  render();
}

async function saveUserProgress() {
  if (!G.user || G.user.role !== "student") return;
  try {
    await db.collection("progress").doc(G.user.id).set({
      enrollments: G.enrollments,
      completedLessons: G.completedLessons,
      quizResults: G.quizResults,
      assignmentSubmissions: G.assignmentSubmissions,
      points: G.user.points || 0,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
  } catch (error) {
    console.error("Error saving progress:", error);
  }
}

async function addCourse(courseData) {
  showLoading();
  try {
    await db.collection("courses").add({
      ...courseData,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      students: 0,
      rating: 5.0,
      modules: courseData.modules || []
    });
    await loadAllData();
    toast("Course added successfully!", "success");
  } catch (error) {
    console.error("Error adding course:", error);
    toast("Error adding course", "danger");
  }
  hideLoading();
}

async function updateCourse(courseId, courseData) {
  showLoading();
  try {
    await db.collection("courses").doc(courseId).update(courseData);
    await loadAllData();
    toast("Course updated successfully!", "success");
  } catch (error) {
    console.error("Error updating course:", error);
    toast("Error updating course", "danger");
  }
  hideLoading();
}

async function deleteCourse(courseId) {
  if (!confirm("⚠️ Delete this course? All student progress will be lost!")) return;
  showLoading();
  try {
    await db.collection("courses").doc(courseId).delete();
    await loadAllData();
    toast("Course deleted!", "success");
    if (G.view === "course-detail") G.view = "admin";
  } catch (error) {
    console.error("Error deleting course:", error);
    toast("Error deleting course", "danger");
  }
  hideLoading();
}

async function addModule(courseId, moduleData) {
  const course = G.courses.find(c => c.id === courseId);
  if (!course) return;
  const newModule = { id: Date.now(), title: moduleData.title, lessons: [] };
  const updatedModules = [...(course.modules || []), newModule];
  await updateCourse(courseId, { modules: updatedModules });
}

async function updateModule(courseId, moduleId, moduleData) {
  const course = G.courses.find(c => c.id === courseId);
  if (!course) return;
  const updatedModules = (course.modules || []).map(m => m.id === moduleId ? { ...m, title: moduleData.title } : m);
  await updateCourse(courseId, { modules: updatedModules });
}

async function deleteModule(courseId, moduleId) {
  const course = G.courses.find(c => c.id === courseId);
  if (!course) return;
  const updatedModules = (course.modules || []).filter(m => m.id !== moduleId);
  await updateCourse(courseId, { modules: updatedModules });
}

async function addLesson(courseId, moduleId, lessonData) {
  const course = G.courses.find(c => c.id === courseId);
  if (!course) return;
  const newLesson = { id: Date.now(), ...lessonData };
  const updatedModules = (course.modules || []).map(m => 
    m.id === moduleId ? { ...m, lessons: [...(m.lessons || []), newLesson] } : m
  );
  await updateCourse(courseId, { modules: updatedModules });
}

async function updateLesson(courseId, moduleId, lessonId, lessonData) {
  const course = G.courses.find(c => c.id === courseId);
  if (!course) return;
  const updatedModules = (course.modules || []).map(m => 
    m.id === moduleId ? { ...m, lessons: (m.lessons || []).map(l => l.id === lessonId ? { ...l, ...lessonData } : l) } : m
  );
  await updateCourse(courseId, { modules: updatedModules });
}

async function deleteLesson(courseId, moduleId, lessonId) {
  const course = G.courses.find(c => c.id === courseId);
  if (!course) return;
  const updatedModules = (course.modules || []).map(m => 
    m.id === moduleId ? { ...m, lessons: (m.lessons || []).filter(l => l.id !== lessonId) } : m
  );
  await updateCourse(courseId, { modules: updatedModules });
}

async function approveUser(userId) {
  try {
    await db.collection("users").doc(userId).update({ status: "approved" });
    await loadAllData();
    toast("User approved!", "success");
  } catch (error) {
    console.error("Error approving user:", error);
    toast("Error approving user", "danger");
  }
}

async function rejectUser(userId) {
  if (!confirm("Reject and remove this user?")) return;
  try {
    await db.collection("users").doc(userId).delete();
    await loadAllData();
    toast("User rejected", "info");
  } catch (error) {
    console.error("Error rejecting user:", error);
    toast("Error rejecting user", "danger");
  }
}

async function enrollStudentInCourse(courseId, studentId) {
  try {
    await db.collection("progress").doc(studentId).set({
      enrollments: { [courseId]: true }
    }, { merge: true });
    toast("Student enrolled!", "success");
  } catch (error) {
    console.error("Error enrolling student:", error);
    toast("Error enrolling student", "danger");
  }
}

// ============================================
// AUTHENTICATION
// ============================================
async function handleLogin(email, password, role) {
  showLoading();
  try {
    const usersSnapshot = await db.collection("users").where("email", "==", email).where("password", "==", password).get();
    if (usersSnapshot.empty) { toast("Invalid credentials", "danger"); hideLoading(); return false; }
    const userDoc = usersSnapshot.docs[0];
    const userData = userDoc.data();
    if (role === "admin" && userData.role !== "admin") { toast("Not an admin account", "danger"); hideLoading(); return false; }
    if (role === "student" && userData.status !== "approved") { toast("Account pending approval", "danger"); hideLoading(); return false; }
    G.user = { id: userDoc.id, ...userData };
    sessionStorage.setItem("lf_user", JSON.stringify(G.user));
    await loadAllData();
    G.view = role === "admin" ? "admin" : "home";
    render();
    toast(`Welcome back, ${G.user.name}!`, "success");
    return true;
  } catch (error) { console.error("Login error:", error); toast("Login error", "danger"); hideLoading(); return false; }
}

async function handleRegister(name, email, password) {
  showLoading();
  try {
    const existing = await db.collection("users").where("email", "==", email).get();
    if (!existing.empty) { toast("Email already registered", "danger"); hideLoading(); return false; }
    await db.collection("users").add({ name, email, password, role: "student", status: "pending", points: 0, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    toast("Account created! Awaiting admin approval.", "success");
    hideLoading();
    return true;
  } catch (error) { console.error("Registration error:", error); toast("Registration error", "danger"); hideLoading(); return false; }
}

function logout() { G.user = null; sessionStorage.removeItem("lf_user"); G.view = "auth"; render(); }

  const views = { home: renderHome, catalog: renderCatalog, "course-detail": renderCourseDetail, lesson: renderLesson, quiz: renderQuiz, assignments: renderAssignments, analytics: renderAnalytics, certificates: renderCertificates, admin: renderAdmin };

function renderCourseOverview(c) {
  return `<div class="card"><h3>About This Course</h3><p>${c.description || 'This comprehensive course will take you from beginner to expert. With hands-on projects and real-world examples, you\'ll gain practical skills that you can apply immediately.'}</p><h3 style="margin-top:20px;">What You'll Learn</h3><ul style="margin-left:20px;"><li>✓ Master core concepts and fundamentals</li><li>✓ Build real-world projects</li><li>✓ Get hands-on experience</li><li>✓ Earn a certificate upon completion</li></ul></div>`;
}

function renderCourseCurriculum(c) {
  return (c.modules || []).map((mod, mi) => `
    <div class="module-item">
      <div class="module-header"><span class="module-title">📘 Module ${mi+1}: ${mod.title}</span><span class="badge badge-gray">${mod.lessons?.length || 0} lessons</span></div>
      ${(mod.lessons || []).map(l => `
        <div class="lesson-item" onclick="startLesson('${c.id}', ${getLessonIndex(c, mi, l)})">
          <span class="lesson-icon">${l.type === 'video' ? '🎬' : l.type === 'quiz' ? '🧠' : l.type === 'assignment' ? '📝' : '📄'}</span>
          <span class="lesson-title">${l.title}</span>
          <span class="lesson-duration">${l.duration || '10 min'}</span>
          <span class="lesson-type">${l.type || 'video'}</span>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function getLessonIndex(course, moduleIdx, lesson) {
  let idx = 0;
  for (let i = 0; i < moduleIdx; i++) idx += (course.modules[i]?.lessons?.length || 0);
  const lessonIdxInModule = (course.modules[moduleIdx]?.lessons || []).findIndex(l => l.id === lesson.id);
  return idx + lessonIdxInModule;
}

function startFirstLesson(courseId) {
  const course = G.courses.find(c => c.id === courseId);
  if (course?.modules?.[0]?.lessons?.[0]) {
    startLesson(courseId, 0);
  }
}

function startLesson(courseId, lessonIndex) {
  G.currentCourse = G.courses.find(c => c.id === courseId);
  const allLessons = [];
  G.currentCourse.modules?.forEach(m => { m.lessons?.forEach(l => allLessons.push(l)); });
  G.currentLesson = { lessons: allLessons, idx: lessonIndex };
  const lesson = allLessons[lessonIndex];
  if (lesson?.type === 'quiz') { startQuiz(lesson); return; }
  if (lesson?.type === 'assignment') { G.view = 'assignments'; render(); return; }
  G.view = "lesson";
  render();
}

function renderLesson() {
  const lesson = G.currentLesson?.lessons[G.currentLesson.idx];
  if (!lesson) return "<p>Lesson not found</p>";
  const isCompleted = G.completedLessons[`${G.currentCourse.id}-${G.currentLesson.idx}`];
  return `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <button class="btn btn-secondary btn-sm" onclick="G.view='course-detail';render()">← Back to Course</button>
        ${isCompleted ? '<span class="badge badge-success">✅ Completed</span>' : ''}
      </div>
      <div style="text-align:center;padding:40px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:var(--radius-lg);color:white;margin-bottom:20px;">
        <div style="font-size:64px;margin-bottom:16px;">${lesson.type === 'video' ? '🎬' : '📖'}</div>
        <h2 style="font-size:24px;margin-bottom:12px;">${lesson.title}</h2>
        <p>Duration: ${lesson.duration || '15 min'}</p>
      </div>
      <div class="text-center" style="padding:20px;">
        <p style="margin-bottom:30px;color:var(--text-2);">${lesson.description || 'This lesson covers important concepts. Watch the video and complete the activities to master the topic.'}</p>
        ${!isCompleted ? `<button class="btn btn-primary" onclick="completeLesson()">✅ Mark Complete & Continue</button>` : `<button class="btn btn-primary" onclick="nextLesson()">Next Lesson →</button>`}
      </div>
    </div>
  `;
}

function completeLesson() {
  const key = `${G.currentCourse.id}-${G.currentLesson.idx}`;
  if (!G.completedLessons[key]) {
    G.completedLessons[key] = true;
    G.user.points = (G.user.points || 0) + 10;
    saveUserProgress();
    toast("🎉 Lesson completed! +10 XP", "success");
  }
  nextLesson();
}

function nextLesson() {
  if (G.currentLesson.idx + 1 < G.currentLesson.lessons.length) {
    G.currentLesson.idx++;
    render();
  } else {
    toast("🏆 Course completed! Certificate earned!", "success");
    G.view = "course-detail";
    render();
  }
}

function startQuiz(lesson) {
  G.quizState = { questions: getQuizQuestions(lesson), current: 0, answers: {}, score: 0, finished: false };
  G.view = "quiz";
  render();
}

function getQuizQuestions(lesson) {
  return [
    { text: "What is the primary purpose of this lesson?", options: ["Learn fundamentals", "Practice skills", "Test knowledge", "All of above"], correct: 3, points: 10 },
    { text: "Which of the following is true about this topic?", options: ["Option A", "Option B", "Option C", "Option D"], correct: 0, points: 10 },
    { text: "True or False: Practice is important for mastery.", type: "tf", correct: true, points: 10 }
  ];
}

function renderQuiz() {
  if (!G.quizState || G.quizState.finished) return renderQuizResults();
  const q = G.quizState.questions[G.quizState.current];
  return `
    <div class="card" style="max-width:700px;margin:0 auto;">
      <div class="section-header"><div><span class="badge badge-brand">Question ${G.quizState.current+1}/${G.quizState.questions.length}</span></div><div class="badge badge-gray">${q.points} points</div></div>
      <h3 style="margin:20px 0;font-size:20px;">${q.text}</h3>
      ${q.options ? q.options.map((opt, i) => `<div class="quiz-option ${G.quizState.answers[G.quizState.current] === i ? 'selected' : ''}" onclick="selectQuizAnswer(${i})">${String.fromCharCode(65+i)}. ${opt}</div>`).join('') : `
        <div style="display:flex;gap:12px;"><button class="btn ${G.quizState.answers[G.quizState.current] === true ? 'btn-primary' : 'btn-secondary'}" onclick="selectQuizAnswer(true)">✓ True</button><button class="btn ${G.quizState.answers[G.quizState.current] === false ? 'btn-primary' : 'btn-secondary'}" onclick="selectQuizAnswer(false)">✗ False</button></div>
      `}
      <div style="display:flex;justify-content:space-between;margin-top:30px;">
        <button class="btn btn-secondary" onclick="prevQuestion()" ${G.quizState.current === 0 ? 'disabled' : ''}>← Previous</button>
        <button class="btn btn-primary" onclick="nextQuestion()">${G.quizState.current === G.quizState.questions.length-1 ? 'Submit Quiz' : 'Next →'}</button>
      </div>
    </div>
  `;
}

function selectQuizAnswer(answer) { G.quizState.answers[G.quizState.current] = answer; render(); }
function prevQuestion() { if (G.quizState.current > 0) { G.quizState.current--; render(); } }
function nextQuestion() {
  if (G.quizState.current === G.quizState.questions.length - 1) finishQuiz();
  else { G.quizState.current++; render(); }
}

function finishQuiz() {
  let total = 0;
  G.quizState.questions.forEach((q, i) => {
    const ans = G.quizState.answers[i];
    if (q.correct !== undefined && ans === q.correct) total += q.points;
    else if (q.correct === undefined && ans !== undefined) total += Math.floor(q.points * 0.7);
  });
  G.quizState.score = total;
  G.quizState.finished = true;
  G.user.points = (G.user.points || 0) + total;
  saveUserProgress();
  render();
}

function renderQuizResults() {
  const pass = G.quizState.score >= 20;
  return `
    <div class="card text-center" style="max-width:500px;margin:0 auto;">
      <div style="font-size:64px;margin-bottom:16px;">${pass ? '🎉' : '📚'}</div>
      <h2>Quiz Complete!</h2>
      <div style="font-size:48px;font-weight:800;color:${pass ? 'var(--success)' : 'var(--warn)'};margin:20px 0;">${G.quizState.score} pts</div>
      <p class="text-muted" style="margin-bottom:20px;">You earned ${G.quizState.score} XP points!</p>
      <button class="btn btn-primary" onclick="G.view='course-detail';render()">Back to Course</button>
    </div>
  `;
}

function renderAssignments() { return `<div class="card"><h3>📝 Assignments</h3><p class="text-muted">Complete assignments to earn bonus XP!</p><div class="text-center" style="padding:40px;">🎯 No pending assignments. Great job!</div></div>`; }
function renderAnalytics() { return `<div class="card"><h3>📊 Learning Analytics</h3><div class="stats-row"><div class="stat-card"><div class="stat-num">${Object.keys(G.completedLessons).length}</div><div class="stat-label">Lessons Done</div></div><div class="stat-card"><div class="stat-num">${G.user?.points || 0}</div><div class="stat-label">Total XP</div></div></div></div>`; }
function renderCertificates() { const earned = G.courses.filter(c => G.enrollments[c.id] && Object.keys(G.completedLessons).filter(k => k.startsWith(c.id)).length > 0); return `<div class="card"><h3>🏆 Your Certificates</h3>${earned.length ? earned.map(c => `<div class="card-sm" style="margin-bottom:12px;"><div>🎓 ${c.title}</div><div class="text-muted">Completed: ${new Date().toLocaleDateString()}</div><button class="btn btn-primary btn-sm mt-2" onclick="toast('Certificate downloaded!','success')">Download PDF</button></div>`).join('') : '<p class="text-center" style="padding:40px;">Complete courses to earn certificates!</p>'}</div>`; }

function enroll(courseId) { G.enrollments[courseId] = true; saveUserProgress(); toast("Enrolled successfully! 🎉", "success"); render(); }

// ============================================
// ADMIN VIEWS
// ============================================
function renderAdmin() {
  const students = G.users.filter(u => u.role === "student");
  const pending = students.filter(u => u.status === "pending");
  const totalRevenue = G.courses.reduce((sum, c) => sum + (c.students || 0) * (c.price || 49), 0);
  return `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${students.length}</div><div class="stat-label">Total Students</div><div class="stat-trend">👥 Active learners</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--warn)">${pending.length}</div><div class="stat-label">Pending Approvals</div><div class="stat-trend">⏳ Awaiting action</div></div>
      <div class="stat-card"><div class="stat-num">${G.courses.length}</div><div class="stat-label">Total Courses</div><div class="stat-trend">📚 Published</div></div>
      <div class="stat-card"><div class="stat-num">$${totalRevenue.toLocaleString()}</div><div class="stat-label">Revenue</div><div class="stat-trend">💰 Estimated</div></div>
    </div>
    <div class="tabs">
      <button class="tab ${G.adminTab === 'overview' ? 'active' : ''}" onclick="G.adminTab='overview';render()">📊 Overview</button>
      <button class="tab ${G.adminTab === 'courses' ? 'active' : ''}" onclick="G.adminTab='courses';render()">📚 Manage Courses</button>
      <button class="tab ${G.adminTab === 'users' ? 'active' : ''}" onclick="G.adminTab='users';render()">👥 Manage Users</button>
      <button class="tab ${G.adminTab === 'add-course' ? 'active' : ''}" onclick="G.adminTab='add-course';render()">➕ Add Course</button>
    </div>
    <div id="adminContent">${renderAdminContent()}</div>
  `;
}

function renderAdminContent() {
  if (G.adminTab === 'overview') return `<div class="card"><h3>📊 Platform Overview</h3><p>Welcome to the admin dashboard. Manage courses, approve students, and track platform growth.</p><div class="stats-row" style="margin-top:20px;"><div class="stat-card"><div class="stat-num">${G.courses.reduce((s,c) => s + (c.modules?.length || 0), 0)}</div><div class="stat-label">Modules</div></div><div class="stat-card"><div class="stat-num">${G.courses.reduce((s,c) => s + (c.modules?.reduce((ss,m) => ss + (m.lessons?.length || 0), 0) || 0), 0)}</div><div class="stat-label">Total Lessons</div></div></div></div>`;
  if (G.adminTab === 'courses') return renderAdminCourses();
  if (G.adminTab === 'users') return renderAdminUsers();
  if (G.adminTab === 'add-course') return renderAddCourseForm();
  return '';
}

function renderAdminCourses() {
  return `
    <div class="card">
      <div class="section-header"><div class="section-title">📚 All Courses</div><button class="btn btn-primary btn-sm" onclick="G.adminTab='add-course';render()">+ Add New Course</button></div>
      <div class="table-wrapper">
        <table class="data-table">
          <thead><tr><th>Course</th><th>Category</th><th>Price</th><th>Students</th><th>Lessons</th><th>Actions</th></tr></thead>
          <tbody>${G.courses.map(c => `
            <tr><td><strong>${c.title}</strong></td><td>${c.category || 'General'}</td><td>$${c.price || 49}</td><td>${c.students || 0}</td><td>${c.modules?.reduce((s,m) => s + (m.lessons?.length || 0), 0) || 0}</td>
            <td class="actions-cell"><button class="btn btn-primary btn-sm" onclick="editCourse('${c.id}')">✏️ Edit</button><button class="btn btn-secondary btn-sm" onclick="manageModules('${c.id}')">📦 Modules</button><button class="btn btn-danger btn-sm" onclick="deleteCourse('${c.id}')">🗑️ Delete</button></td></tr>
          `).join('')}</tbody>
        </table>
      </div>
    </div>
  `;
}

function editCourse(courseId) {
  const course = G.courses.find(c => c.id === courseId);
  if (!course) return;
  openModal("Edit Course", `
    <div class="form-group"><label class="form-label">Course Title</label><input class="form-input" id="editTitle" value="${course.title.replace(/"/g, '&quot;')}"></div>
    <div class="form-group"><label class="form-label">Category</label><input class="form-input" id="editCategory" value="${course.category || 'General'}"></div>
    <div class="form-group"><label class="form-label">Description</label><textarea class="form-textarea" id="editDescription">${course.description || ''}</textarea></div>
    <div class="form-row"><div class="form-group"><label class="form-label">Duration</label><input class="form-input" id="editDuration" value="${course.duration || '10 hours'}"></div><div class="form-group"><label class="form-label">Price</label><input class="form-input" id="editPrice" type="number" value="${course.price || 49}"></div></div>
    <div class="form-group"><label class="form-label">Level</label><select class="form-select" id="editLevel"><option ${course.level === 'Beginner' ? 'selected' : ''}>Beginner</option><option ${course.level === 'Intermediate' ? 'selected' : ''}>Intermediate</option><option ${course.level === 'Advanced' ? 'selected' : ''}>Advanced</option></select></div>
    <div class="form-group"><label class="form-label">Icon (emoji)</label><input class="form-input" id="editThumb" value="${course.thumb || '📚'}"></div>
    <div class="flex gap-2 mt-4"><button class="btn btn-primary" onclick="saveCourseEdit('${courseId}')">Save Changes</button><button class="btn btn-secondary" onclick="closeModal()">Cancel</button></div>
  `);
}

function saveCourseEdit(courseId) {
  updateCourse(courseId, {
    title: document.getElementById("editTitle")?.value,
    category: document.getElementById("editCategory")?.value,
    description: document.getElementById("editDescription")?.value,
    duration: document.getElementById("editDuration")?.value,
    price: parseInt(document.getElementById("editPrice")?.value) || 49,
    level: document.getElementById("editLevel")?.value,
    thumb: document.getElementById("editThumb")?.value
  });
  closeModal();
}

function manageModules(courseId) {
  const course = G.courses.find(c => c.id === courseId);
  if (!course) return;
  openModal(`Manage Modules: ${course.title}`, `
    <div id="modulesList">${(course.modules || []).map((mod, idx) => `
      <div class="module-item" style="margin-bottom:12px;">
        <div class="module-header"><span class="module-title">📘 Module ${idx+1}: ${mod.title}</span><div><button class="btn btn-sm btn-secondary" onclick="editModule('${courseId}', '${mod.id}')">✏️</button><button class="btn btn-sm btn-danger" onclick="deleteModuleConfirm('${courseId}', '${mod.id}')">🗑️</button></div></div>
        ${(mod.lessons || []).map(lesson => `<div style="padding:10px 20px 10px 40px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;"><span>${lesson.type === 'video' ? '🎬' : lesson.type === 'quiz' ? '🧠' : '📝'} ${lesson.title}</span><div><button class="btn btn-sm btn-secondary" onclick="editLesson('${courseId}', '${mod.id}', '${lesson.id}')">✏️</button><button class="btn btn-sm btn-danger" onclick="deleteLessonConfirm('${courseId}', '${mod.id}', '${lesson.id}')">🗑️</button></div></div>`).join('')}
        <div style="padding:12px 20px;"><button class="btn btn-sm btn-primary" onclick="addLessonForm('${courseId}', '${mod.id}')">+ Add Lesson</button></div>
      </div>
    `).join('')}</div>
    <div style="margin-top:20px;"><button class="btn btn-primary" onclick="addModuleForm('${courseId}')">+ Add New Module</button></div>
    <div style="margin-top:16px;"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>
  `);
}

function addModuleForm(courseId) {
  const title = prompt("Enter module title:");
  if (title) addModule(courseId, { title });
  closeModal();
  manageModules(courseId);
}

function editModule(courseId, moduleId) {
  const course = G.courses.find(c => c.id === courseId);
  const module = course?.modules?.find(m => m.id == moduleId);
  if (!module) return;
  const newTitle = prompt("Edit module title:", module.title);
  if (newTitle && newTitle !== module.title) updateModule(courseId, moduleId, { title: newTitle });
  manageModules(courseId);
}

function deleteModuleConfirm(courseId, moduleId) {
  if (confirm("Delete this module and all its lessons?")) deleteModule(courseId, moduleId);
  manageModules(courseId);
}

function addLessonForm(courseId, moduleId) {
  openModal("Add Lesson", `
    <div class="form-group"><label class="form-label">Lesson Title</label><input class="form-input" id="lessonTitle" placeholder="Lesson title"></div>
    <div class="form-group"><label class="form-label">Type</label><select class="form-select" id="lessonType"><option value="video">Video</option><option value="quiz">Quiz</option><option value="assignment">Assignment</option></select></div>
    <div class="form-group"><label class="form-label">Duration</label><input class="form-input" id="lessonDuration" placeholder="e.g., 15 min"></div>
    <div class="form-group"><label class="form-label">Description (optional)</label><textarea class="form-textarea" id="lessonDescription" placeholder="What will students learn?"></textarea></div>
    <div class="flex gap-2 mt-4"><button class="btn btn-primary" onclick="saveLesson('${courseId}', '${moduleId}')">Add Lesson</button><button class="btn btn-secondary" onclick="closeModal()">Cancel</button></div>
  `);
}

function saveLesson(courseId, moduleId) {
  addLesson(courseId, moduleId, {
    title: document.getElementById("lessonTitle")?.value,
    type: document.getElementById("lessonType")?.value,
    duration: document.getElementById("lessonDuration")?.value,
    description: document.getElementById("lessonDescription")?.value || ""
  });
  closeModal();
  manageModules(courseId);
}

function editLesson(courseId, moduleId, lessonId) {
  const course = G.courses.find(c => c.id === courseId);
  const lesson = course?.modules?.find(m => m.id == moduleId)?.lessons?.find(l => l.id == lessonId);
  if (!lesson) return;
  openModal("Edit Lesson", `
    <div class="form-group"><label class="form-label">Lesson Title</label><input class="form-input" id="lessonTitle" value="${lesson.title.replace(/"/g, '&quot;')}"></div>
    <div class="form-group"><label class="form-label">Type</label><select class="form-select" id="lessonType"><option ${lesson.type === 'video' ? 'selected' : ''} value="video">Video</option><option ${lesson.type === 'quiz' ? 'selected' : ''} value="quiz">Quiz</option><option ${lesson.type === 'assignment' ? 'selected' : ''} value="assignment">Assignment</option></select></div>
    <div class="form-group"><label class="form-label">Duration</label><input class="form-input" id="lessonDuration" value="${lesson.duration || ''}"></div>
    <div class="form-group"><label class="form-label">Description</label><textarea class="form-textarea" id="lessonDescription">${lesson.description || ''}</textarea></div>
    <div class="flex gap-2"><button class="btn btn-primary" onclick="updateLessonSave('${courseId}', '${moduleId}', '${lessonId}')">Save</button><button class="btn btn-secondary" onclick="closeModal()">Cancel</button></div>
  `);
}

function updateLessonSave(courseId, moduleId, lessonId) {
  updateLesson(courseId, moduleId, lessonId, {
    title: document.getElementById("lessonTitle")?.value,
    type: document.getElementById("lessonType")?.value,
    duration: document.getElementById("lessonDuration")?.value,
    description: document.getElementById("lessonDescription")?.value
  });
  closeModal();
  manageModules(courseId);
}

function deleteLessonConfirm(courseId, moduleId, lessonId) {
  if (confirm("Delete this lesson?")) deleteLesson(courseId, moduleId, lessonId);
  manageModules(courseId);
}

function renderAdminUsers() {
  const students = G.users.filter(u => u.role === "student");
  const pending = students.filter(u => u.status === "pending");
  return `
    ${pending.length ? `<div class="card"><h3>⏳ Pending Approvals (${pending.length})</h3><div class="table-wrapper"><table class="data-table"><thead><tr><th>Name</th><th>Email</th><th>Registered</th><th>Action</th></tr></thead><tbody>${pending.map(u => `<tr><td>${u.name}</td><td>${u.email}</td><td>${new Date(u.createdAt?.toDate?.() || Date.now()).toLocaleDateString()}</td><td class="actions-cell"><button class="btn btn-success btn-sm" onclick="approveUser('${u.id}')">✅ Approve</button><button class="btn btn-danger btn-sm" onclick="rejectUser('${u.id}')">❌ Reject</button></td>`).join('')}</tbody></table></div></div>` : ''}
    <div class="card"><h3>👥 All Students (${students.length})</h3><div class="table-wrapper"><table class="data-table"><thead><tr><th>Name</th><th>Email</th><th>Status</th><th>XP Points</th><th>Enrolled</th></thead><tbody>${students.map(u => `<tr><td>${u.name}</td><td>${u.email}</td><td><span class="badge ${u.status === 'approved' ? 'badge-success' : 'badge-warn'}">${u.status}</span></td><td>${u.points || 0}</td><td>${Object.keys(G.enrollments).filter(cid => G.enrollments[cid] && G.users.find(s => s.id === u.id)).length || 0}</td>`).join('')}</tbody></table></div></div>
  `;
}

function renderAddCourseForm() {
  return `
    <div class="card">
      <h3>➕ Create New Course</h3>
      <form id="addCourseForm">
        <div class="form-group"><label class="form-label">Course Title *</label><input class="form-input" id="courseTitle" required placeholder="e.g., Advanced JavaScript"></div>
        <div class="form-row"><div class="form-group"><label class="form-label">Category</label><input class="form-input" id="courseCategory" value="Development"></div><div class="form-group"><label class="form-label">Level</label><select class="form-select" id="courseLevel"><option>Beginner</option><option>Intermediate</option><option>Advanced</option></select></div></div>
        <div class="form-group"><label class="form-label">Description</label><textarea class="form-textarea" id="courseDescription" placeholder="What will students learn?"></textarea></div>
        <div class="form-row"><div class="form-group"><label class="form-label">Duration</label><input class="form-input" id="courseDuration" placeholder="e.g., 20 hours"></div><div class="form-group"><label class="form-label">Price ($)</label><input class="form-input" id="coursePrice" type="number" value="49"></div></div>
        <div class="form-row"><div class="form-group"><label class="form-label">Icon (emoji)</label><input class="form-input" id="courseThumb" value="📚"></div><div class="form-group"><label class="form-label">Background Color</label><input class="form-input" id="courseThumbBg" value="#eef2ff" type="color"></div></div>
        <div class="flex gap-2"><button type="submit" class="btn btn-primary">✨ Create Course</button><button type="button" class="btn btn-secondary" onclick="G.adminTab='courses';render()">Cancel</button></div>
      </form>
    </div>
  `;
}

function bindAdminEvents() {
  const form = document.getElementById("addCourseForm");
  if (form) {
    form.onsubmit = async (e) => {
      e.preventDefault();
      await addCourse({
        title: document.getElementById("courseTitle")?.value,
        category: document.getElementById("courseCategory")?.value,
        level: document.getElementById("courseLevel")?.value,
        description: document.getElementById("courseDescription")?.value,
        duration: document.getElementById("courseDuration")?.value,
        price: parseInt(document.getElementById("coursePrice")?.value) || 49,
        thumb: document.getElementById("courseThumb")?.value,
        thumbBg: document.getElementById("courseThumbBg")?.value,
        instructor: G.user.name,
        instructorInitials: G.user.name.slice(0,2).toUpperCase(),
        modules: []
      });
      G.adminTab = "courses";
      render();
    };
  }
}

// ============================================
// INITIALIZATION
// ============================================
async function init() {
  const saved = sessionStorage.getItem("lf_user");
  if (saved) {
    G.user = JSON.parse(saved);
    await loadAllData();
    G.view = G.user.role === "admin" ? "admin" : "home";
  }
  render();
}

init();
</script>
</body>
</html>
